name: Manage Release PRs and Publish Crates

# Least-privilege default for every job; jobs that need more grant it themselves
# (release-pr needs to open PRs, publish needs OIDC + tag pushes).
permissions:
  contents: read

on:
  push:
    branches:
      - main

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.FG_LABS_BOT_APP_ID }}
          private-key: ${{ secrets.FG_LABS_BOT_PRIVATE_KEY }}
      # release-plz authenticates via the app token in the GITHUB_TOKEN env below, so the
      # checkout's persisted git credentials aren't needed; drop them (zizmor artipacked).
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Create or update release PR
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.FG_LABS_BOT_APP_ID }}
          private-key: ${{ secrets.FG_LABS_BOT_PRIVATE_KEY }}
      # Don't persist the app token in git config (zizmor artipacked); the tag push in the
      # release step below re-authenticates explicitly via `git remote set-url`.
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Authenticate to crates.io via Trusted Publishing
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish crate
        id: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          set -euo pipefail

          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r \
            '.packages[] | select(.name == "spoars") | .version')

          PUBLISHED_VERSION=$(curl -sS --max-time 30 --retry 3 --retry-delay 2 \
            -H "User-Agent: spoars-ci (https://github.com/fg-labs/spoars)" \
            "https://crates.io/api/v1/crates/spoars" | jq -r \
            '.crate.max_version // "0.0.0"')

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "spoars v$VERSION already on crates.io -- nothing to publish"
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Publishing spoars v$VERSION..."
          cargo publish -p spoars
          echo "Published spoars v$VERSION"
          echo "published=true" >> "$GITHUB_OUTPUT"

      # Only tag/release when a crate was actually published; on a no-op crates.io check
      # `published` is false and there's nothing to release.
      - name: Create GitHub release
        if: steps.publish.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.publish.outputs.version }}"
          TAG="v${VERSION}"

          # Checkout ran with persist-credentials: false, so authenticate the tag push
          # explicitly with the app token rather than relying on persisted git credentials.
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          # Idempotent: skip if tag/release already exist
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
          fi
          if ! git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            git push origin "$TAG"
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "v${VERSION}" \
              --generate-notes \
              --latest
          else
            echo "Release $TAG already exists -- skipping"
          fi
